<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aman Creations | Premium Gifts &amp; Lucknowi Craft</title>
  <meta name="description" content="Handpicked luxury gifts, chikankari and curated hampers from Lucknow. Ordered personally over WhatsApp." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
:root {
  --bg: #0D0D0D;
  --surface: #1A1A1A;
  --surface-2: #232220;
  --gold: #C9A84C;
  --gold-light: #E8D5A3;
  --gold-dim: #8c7637;
  --text: #F5F0E8;
  --text-dim: #A09880;
  --rose: #C47B5A;
  --border: rgba(201, 168, 76, 0.18);
  --border-strong: rgba(201, 168, 76, 0.42);
  --shadow-gold: 0 18px 50px -20px rgba(201, 168, 76, 0.45);

  --font-display: "Playfair Display", "Times New Roman", serif;
  --font-accent: "Cormorant Garamond", "Times New Roman", serif;
  --font-body: "DM Sans", system-ui, -apple-system, sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
body {
  font-family: var(--font-body);
  font-weight: 400;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

/* Noise grain overlay */
body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: .06;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/></svg>");
}

/* Ambient gold blobs */
.amb {
  position: absolute;
  border-radius: 50%;
  filter: blur(110px);
  opacity: .25;
  pointer-events: none;
  z-index: 0;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; }

/* Selection */
::selection { background: var(--gold); color: var(--bg); }

/* Custom scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: #060606; }
::-webkit-scrollbar-thumb { background: #2a2620; border-radius: 8px; border: 2px solid #060606; }
::-webkit-scrollbar-thumb:hover { background: #3a3528; }

/* ───────── Typography helpers ───────── */
.serif { font-family: var(--font-display); }
.accent-font { font-family: var(--font-accent); }
.eyebrow {
  font-family: var(--font-body);
  font-size: 11px;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
}
.section-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(36px, 4.5vw, 64px);
  line-height: 1.05;
  letter-spacing: -0.01em;
  color: var(--text);
  margin: 0;
}
.section-title em { font-style: italic; color: var(--gold-light); }

.divider-gold {
  display: inline-flex; align-items: center; gap: 12px;
  color: var(--gold);
}
.divider-gold::before, .divider-gold::after {
  content: ""; width: 36px; height: 1px; background: currentColor; opacity: .55;
}
.diamond {
  width: 6px; height: 6px;
  transform: rotate(45deg);
  background: currentColor;
}

/* ───────── Buttons ───────── */
.btn {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 14px 26px;
  border-radius: 0;
  cursor: pointer;
  border: 1px solid transparent;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  transition: all .25s ease;
  position: relative;
  overflow: hidden;
}
.btn-gold {
  background: var(--gold);
  color: #18130a;
  border-color: var(--gold);
}
.btn-gold:hover {
  background: var(--gold-light);
  border-color: var(--gold-light);
  transform: translateY(-1px);
  box-shadow: 0 12px 28px -10px rgba(201, 168, 76, 0.6);
}
.btn-ghost {
  background: transparent;
  color: var(--text);
  border-color: var(--border-strong);
}
.btn-ghost:hover {
  background: rgba(201,168,76,.08);
  border-color: var(--gold);
  color: var(--gold-light);
}
.btn-sm { padding: 10px 18px; font-size: 11px; }

/* ───────── Layout ───────── */
.container {
  width: 100%;
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 32px;
  position: relative;
}
@media (max-width: 720px) { .container { padding: 0 20px; } }

section { position: relative; }

/* ───────── Navbar ───────── */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  transition: all .35s ease;
  padding: 22px 0;
}
.nav.scrolled {
  background: rgba(13,13,13,0.85);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border-bottom: 1px solid var(--border);
  padding: 14px 0;
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px;
}
.nav-logo {
  display: flex; align-items: baseline; gap: 8px;
}
.nav-logo-mark {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 500;
  letter-spacing: .01em;
  color: var(--text);
}
.nav-logo-mark em { color: var(--gold); font-style: italic; }
.nav-logo-sub {
  font-size: 9px;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.nav-links { display: flex; gap: 38px; }
.nav-link {
  font-size: 12px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--text-dim);
  transition: color .2s;
  position: relative;
  cursor: pointer;
  padding: 4px 0;
}
.nav-link:hover { color: var(--gold-light); }
.nav-link::after {
  content: ""; position: absolute; left: 0; right: 100%; bottom: -2px;
  height: 1px; background: var(--gold);
  transition: right .25s ease;
}
.nav-link:hover::after { right: 0; }
.nav-actions { display: flex; align-items: center; gap: 14px; }
.icon-btn {
  width: 40px; height: 40px;
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 50%;
  cursor: pointer;
  position: relative;
  transition: all .22s;
}
.icon-btn:hover {
  background: rgba(201,168,76,.08);
  border-color: var(--gold);
  color: var(--gold-light);
}
.cart-badge {
  position: absolute;
  top: -4px; right: -4px;
  min-width: 18px; height: 18px;
  background: var(--gold);
  color: #18130a;
  border-radius: 9px;
  font-size: 10px;
  font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center;
  padding: 0 5px;
}
.nav-mobile-toggle { display: none; }
@media (max-width: 920px) {
  .nav-links { display: none; }
  .nav-mobile-toggle { display: inline-flex; }
}

/* ───────── Hero ───────── */
.hero {
  min-height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  padding-top: 120px;
  padding-bottom: 80px;
  overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 70% 20%, rgba(201,168,76,0.12), transparent 60%),
    radial-gradient(ellipse 60% 60% at 20% 80%, rgba(196,123,90,0.08), transparent 60%),
    linear-gradient(180deg, #0a0a0a 0%, #0D0D0D 60%, #060606 100%);
}
.hero-grid {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 64px;
  align-items: center;
}
@media (max-width: 920px) { .hero-grid { grid-template-columns: 1fr; gap: 48px; } }

.hero-eyebrow { margin-bottom: 32px; display: inline-flex; align-items: center; gap: 14px; }
.hero-headline {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(48px, 7vw, 96px);
  line-height: 1.0;
  letter-spacing: -0.02em;
  margin: 0;
  color: var(--text);
}
.hero-headline em { font-style: italic; color: var(--gold-light); font-weight: 400; }
.hero-headline .ampersand {
  font-family: var(--font-accent);
  font-style: italic;
  font-weight: 400;
  color: var(--gold);
}
.hero-sub {
  margin-top: 28px;
  max-width: 480px;
  font-size: 17px;
  line-height: 1.6;
  color: var(--text-dim);
}
.hero-ctas { margin-top: 44px; display: flex; gap: 14px; flex-wrap: wrap; }

.hero-meta {
  margin-top: 56px;
  display: flex; gap: 36px;
  padding-top: 28px;
  border-top: 1px solid var(--border);
}
.hero-meta-item {
  font-size: 11px;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.hero-meta-item b {
  display: block;
  font-family: var(--font-accent);
  font-size: 32px;
  font-weight: 500;
  letter-spacing: 0;
  text-transform: none;
  color: var(--gold-light);
  margin-bottom: 4px;
}

/* Hero visual */
.hero-visual {
  position: relative;
  aspect-ratio: 4/5;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-card {
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 30px 80px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,.04) inset;
  transition: transform .8s cubic-bezier(.2,.7,.2,1);
}
.hero-card-main {
  inset: 6% 12% 6% 12%;
  z-index: 3;
}
.hero-card-bg1 {
  top: 2%; left: 0; width: 56%; aspect-ratio: 3/4;
  transform: rotate(-7deg) translateY(8%);
  z-index: 1;
  opacity: .9;
}
.hero-card-bg2 {
  bottom: 2%; right: 0; width: 52%; aspect-ratio: 3/4;
  transform: rotate(6deg) translateY(-4%);
  z-index: 2;
  opacity: .95;
}
.hero-decor-ring {
  position: absolute;
  width: 320px; height: 320px;
  border-radius: 50%;
  border: 1px solid var(--border-strong);
  top: 10%; right: -10%;
  z-index: 0;
  animation: ringSpin 60s linear infinite;
}
.hero-decor-ring::before, .hero-decor-ring::after {
  content: ""; position: absolute; inset: 12%;
  border-radius: 50%; border: 1px dashed rgba(201,168,76,.25);
}
.hero-decor-ring::after { inset: 28%; border-style: solid; opacity: .6; }
@keyframes ringSpin { to { transform: rotate(360deg); } }

.scroll-indicator {
  position: absolute;
  left: 50%; bottom: 32px;
  transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  z-index: 5;
}
.scroll-indicator span {
  font-size: 9px; letter-spacing: .35em; text-transform: uppercase;
  color: var(--text-dim);
}
.scroll-indicator-line {
  width: 1px; height: 40px;
  background: linear-gradient(180deg, var(--gold), transparent);
  animation: scrollLine 2.2s ease-in-out infinite;
}
@keyframes scrollLine {
  0% { transform-origin: top; transform: scaleY(0); }
  50% { transform-origin: top; transform: scaleY(1); }
  51% { transform-origin: bottom; transform: scaleY(1); }
  100% { transform-origin: bottom; transform: scaleY(0); }
}

/* ───────── Trust strip ───────── */
.trust {
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 24px 0;
  overflow: hidden;
  position: relative;
}
.trust-track {
  display: flex; align-items: center; gap: 64px;
  animation: trustScroll 42s linear infinite;
  width: max-content;
}
.trust-item {
  display: inline-flex; align-items: center; gap: 18px;
  font-size: 12px; letter-spacing: .25em; text-transform: uppercase;
  color: var(--text-dim);
  white-space: nowrap;
}
.trust-item .diamond { background: var(--gold); width: 5px; height: 5px; }
@keyframes trustScroll { to { transform: translateX(-50%); } }

/* ───────── Section header ───────── */
.section-pad { padding: 120px 0; }
@media (max-width: 720px) { .section-pad { padding: 80px 0; } }

.section-head {
  display: flex; align-items: end; justify-content: space-between;
  gap: 40px;
  margin-bottom: 56px;
}
.section-head-lead { max-width: 640px; }
.section-head .eyebrow { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 18px; }

/* ───────── Filter tabs ───────── */
.filter-tabs {
  display: flex; gap: 4px;
  padding: 6px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: rgba(255,255,255,.02);
}
.filter-tab {
  padding: 10px 20px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--text-dim);
  background: transparent;
  border: 0;
  border-radius: 999px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.filter-tab:hover { color: var(--gold-light); }
.filter-tab.active {
  background: var(--gold);
  color: #18130a;
}

/* ───────── Product grid ───────── */
.product-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px;
}
@media (max-width: 980px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .product-grid { grid-template-columns: 1fr; gap: 20px; } }

.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s, border-color .35s;
  display: flex; flex-direction: column;
}
.product-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-gold);
  border-color: var(--border-strong);
}
.product-card-media {
  position: relative;
  aspect-ratio: 4/5;
  overflow: hidden;
  background: #0e0e0e;
}
.product-card-media > .ph-img {
  width: 100%; height: 100%;
  transition: transform .9s cubic-bezier(.2,.7,.2,1);
}
.product-card:hover .product-card-media > .ph-img { transform: scale(1.06); }

.product-badge {
  position: absolute;
  top: 16px; left: 16px;
  padding: 6px 12px;
  background: rgba(13,13,13,.7);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border-strong);
  color: var(--gold-light);
  font-size: 10px;
  letter-spacing: .2em;
  text-transform: uppercase;
  font-weight: 500;
  z-index: 2;
}
.product-wish {
  position: absolute;
  top: 14px; right: 14px;
  width: 36px; height: 36px;
  background: rgba(13,13,13,.6);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--text-dim);
  cursor: pointer;
  transition: all .2s;
  z-index: 2;
}
.product-wish:hover { color: var(--rose); border-color: var(--rose); }
.product-wish.active { color: var(--rose); border-color: var(--rose); background: rgba(196,123,90,.18); }

.product-card-body {
  padding: 22px 22px 24px;
  display: flex; flex-direction: column; gap: 8px;
  flex: 1;
}
.product-card-meta {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
  color: var(--text-dim);
}
.product-card-name {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  line-height: 1.2;
  color: var(--text);
  margin: 4px 0 0;
}
.product-card-desc {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
  margin: 0;
}
.product-card-foot {
  margin-top: auto;
  padding-top: 18px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border);
}
.product-price {
  font-family: var(--font-accent);
  font-size: 28px;
  font-weight: 500;
  color: var(--gold-light);
  letter-spacing: -.01em;
}
.product-price .rupee { font-size: 20px; opacity: .8; margin-right: 2px; }

.product-card-add {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 10px 16px;
  font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
  cursor: pointer;
  font-weight: 500;
  transition: all .22s;
  display: inline-flex; align-items: center; gap: 8px;
}
.product-card-add:hover { background: var(--gold); color: #18130a; }

.image-dots {
  position: absolute;
  bottom: 12px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px;
  z-index: 2;
}
.image-dots span {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(245,240,232,.4);
}
.image-dots span.active { background: var(--gold); width: 18px; border-radius: 3px; }

/* ───────── Offers ───────── */
.offers-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}
@media (max-width: 820px) { .offers-grid { grid-template-columns: 1fr; } }

.offer-card {
  background: linear-gradient(135deg, #1a1815 0%, #14110d 100%);
  border: 1px solid var(--border);
  padding: 36px;
  display: flex; gap: 28px;
  position: relative;
  overflow: hidden;
  transition: all .3s;
}
.offer-card:hover { border-color: var(--border-strong); }
.offer-card::after {
  content: ""; position: absolute;
  top: -40%; right: -20%;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,.16), transparent 60%);
  pointer-events: none;
}
.offer-visual {
  flex-shrink: 0;
  width: 130px; height: 130px;
  position: relative;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 4px;
}
.offer-visual .ph-img { width: 100%; height: 100%; }
.offer-body { flex: 1; display: flex; flex-direction: column; }
.offer-badge {
  display: inline-flex;
  align-self: flex-start;
  padding: 5px 12px;
  background: rgba(196,123,90,.15);
  border: 1px solid var(--rose);
  color: var(--rose);
  font-size: 10px;
  letter-spacing: .25em;
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 12px;
}
.offer-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 500;
  color: var(--text);
  margin: 0 0 8px;
}
.offer-desc { font-size: 13px; color: var(--text-dim); margin: 0 0 18px; line-height: 1.5; }
.offer-price-row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 20px; }
.offer-price-was {
  font-family: var(--font-accent);
  font-size: 18px;
  color: var(--text-dim);
  text-decoration: line-through;
}
.offer-price-now {
  font-family: var(--font-accent);
  font-size: 28px;
  font-weight: 500;
  color: var(--gold-light);
}
.offer-cta {
  margin-top: auto;
  align-self: flex-start;
}

/* ───────── Why us ───────── */
.why-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}
@media (max-width: 820px) { .why-grid { grid-template-columns: 1fr; } }
.why-col {
  background: var(--bg);
  padding: 56px 40px;
  display: flex; flex-direction: column; gap: 18px;
  transition: background .3s;
}
.why-col:hover { background: var(--surface); }
.why-icon {
  width: 56px; height: 56px;
  border: 1px solid var(--border-strong);
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--gold);
  margin-bottom: 12px;
}
.why-title {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 500;
  margin: 0;
  color: var(--text);
}
.why-desc { font-size: 14px; color: var(--text-dim); line-height: 1.6; margin: 0; }

/* ───────── Contact ───────── */
.contact-grid {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 64px;
  align-items: start;
}
@media (max-width: 820px) { .contact-grid { grid-template-columns: 1fr; gap: 40px; } }

.contact-list { display: flex; flex-direction: column; gap: 4px; margin-top: 36px; }
.contact-row {
  display: flex; align-items: center; gap: 22px;
  padding: 22px 4px;
  border-bottom: 1px solid var(--border);
  transition: all .25s;
}
.contact-row:hover { padding-left: 12px; }
.contact-row:hover .contact-row-arrow { transform: translateX(4px); color: var(--gold-light); }
.contact-row-icon {
  width: 44px; height: 44px;
  border: 1px solid var(--border-strong);
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--gold);
  flex-shrink: 0;
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

    <div
      className={"ph-img " + className}
      style={{
        background: bgs[v],

const useScrollReveal = () => {
  React.useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add("visible");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0, rootMargin: "0px 0px -10% 0px" });

    const observe = () => {
      document.querySelectorAll(".reveal, .reveal-stagger").forEach((el) => {
        if (el.classList.contains("visible") || el.dataset.revealObserved) return;
        el.dataset.revealObserved = "1";
        // Immediately reveal anything already in viewport at observe time
        const r = el.getBoundingClientRect();
        if (r.top < window.innerHeight && r.bottom > 0) {
          // Use rAF so the CSS transition still plays
          requestAnimationFrame(() => el.classList.add("visible"));
        } else {
          io.observe(el);
        }
      });
    };
    // Defer first run so freshly-mounted React tree exists
    requestAnimationFrame(observe);
    const mo = new MutationObserver(() => requestAnimationFrame(observe));
    mo.observe(document.body, { childList: true, subtree: true });
    return () => { io.disconnect(); mo.disconnect(); };
  }, []);
};

const WhatsAppHandoff = () => {
  const [open, setOpen] = React.useState(false);
  const [message, setMessage] = React.useState("");
  const [copied, setCopied] = React.useState(false);
  const PHONE = "+91 94150 21052";
  const PHONE_RAW = "919415021052";

  React.useEffect(() => {
    const onMsg = (e) => {
      setMessage(e.detail.message || "");
      setCopied(false);
      setOpen(true);
    };
    window.addEventListener("ac-whatsapp", onMsg);
    return () => window.removeEventListener("ac-whatsapp", onMsg);
  }, []);

  React.useEffect(() => {
    if (open) {
      const prev = document.body.style.overflow;
      document.body.style.overflow = "hidden";
      return () => { document.body.style.overflow = prev; };
    }
  }, [open]);

  const openInApp = () => {
    const url = `whatsapp://send?phone=${PHONE_RAW}&text=${encodeURIComponent(message)}`;
    window.location.href = url;
  };

  const copyMessage = async () => {
    try {
      await navigator.clipboard.writeText(message);
      setCopied(true);
      setTimeout(() => setCopied(false), 2400);
    } catch (e) {
      const ta = document.querySelector(".wa-handoff-msg");
      if (ta) {
        const r = document.createRange();
        r.selectNodeContents(ta);
        const s = window.getSelection();
        s.removeAllRanges();
        s.addRange(r);
      }
    }
  };

  return (
    <div className={"wa-handoff " + (open ? "open" : "")} onClick={(e) => {
      if (e.target === e.currentTarget) setOpen(false);
    }}>
      <div className="wa-handoff-card">
        <div className="wa-handoff-head">
          <div>
            <h3>Send via WhatsApp</h3>
            <p>Your message is ready. Open the app, or copy and paste it manually.</p>
          </div>
          <button className="wa-handoff-close" onClick={() => setOpen(false)} aria-label="Close">
            <Icon name="x" size={14} />
          </button>
        </div>

        <div className="wa-handoff-body">
          <div className="wa-handoff-msg">{message}</div>
          <div className="wa-handoff-number">
            <div>
              <div className="wa-handoff-number-label">Send to</div>
              <div className="wa-handoff-number-value">{PHONE}</div>
            </div>
            <Icon name="whatsapp" size={28} />
          </div>
        </div>

        <div className="wa-handoff-foot">
          <div className="wa-handoff-row">
            <button className="btn btn-gold" onClick={openInApp}>
              <Icon name="whatsapp" size={14} /> Open WhatsApp
            </button>
            <button className="btn btn-ghost" onClick={copyMessage}>
              {copied ? "Copied" : "Copy Message"}
            </button>
          </div>
          <div className="wa-handoff-note">
            On mobile, "Open WhatsApp" launches the app directly. On desktop, it opens WhatsApp Desktop if installed.
          </div>
        </div>
      </div>
    </div>
  );
};

window.WhatsAppHandoff = WhatsAppHandoff;

const openWhatsApp = (message) => {
  // Dispatch event — App listens and shows a handoff modal with:
  //   1) "Open WhatsApp" button (whatsapp:// protocol — no web URL)
  //   2) "Copy message" fallback
  //   3) The number to send to manually if needed
  try {
    window.dispatchEvent(new CustomEvent("ac-whatsapp", { detail: { message } }));
  } catch (e) {}
};

const buildOrderMessage = (orderId, customer, items, total) => {
  let m = `Hi! I'd like to place a new order with Aman Creations.\n\n`;
  m += `*Order ID:* ${orderId}\n\n`;
  m += `*Customer Details*\n`;
  m += `Name: ${customer.name}\n`;
  m += `Phone: ${customer.phone}\n`;
  m += `City: ${customer.city}\n\n`;
  m += `*Order Items*\n`;
  items.forEach((it, i) => {
    m += `${i + 1}. ${it.name} (#${it.code})\n`;
    m += `   Qty: ${it.qty} x Rs.${it.price} = Rs.${it.price * it.qty}\n`;
  });
  m += `\n*Total: Rs.${total}*\n`;
  if (customer.message) m += `\n*Special Request:*\n${customer.message}\n`;
  m += `\nSent from the Aman Creations website.`;
  return m;
};

  return `ORD-${yyyymmdd}-${suffix}`;
};

// Compress image file to a base64 JPEG, max 900px on longest side, quality 0.75
// Keeps each image under ~150KB as base64 — safe for Firestore's 1MB doc limit
const compressImage = (file) => new Promise((resolve, reject) => {
  const MAX = 900;
  const reader = new FileReader();
  reader.onerror = reject;
  reader.onload = (e) => {
    const img = new Image();
    img.onerror = reject;
    img.onload = () => {
      const ratio = Math.min(1, MAX / Math.max(img.width, img.height));
      const w = Math.round(img.width  * ratio);
      const h = Math.round(img.height * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.75));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

  return (

// ─── ProductForm ──────────────────────────────────────────────────────────────
const ProductForm = ({ product, sections, totalProducts, onSave, onCancel }) => {
  const isEdit = !!product;
  const [form, setForm] = React.useState({
    name:         product?.name || '',
    section:      product?.section || (sections[0]?.name || 'Gift Items'),
    short:        product?.short || '',
    long:         product?.long || '',
    instructions: product?.instructions || '',
    price:        product?.price || '',
    badge:        product?.badge || '',
    stock_status: product?.stock_status || 'in_stock',
    is_visible:   product?.is_visible !== false,
    motif:        product?.motif || 'flora',
    palette:      product?.palette || ['#c9a84c','#8c7637','#e8d5a3'],
    // images: array of {type:'existing',data:base64} or {type:'new',file,preview}
    images: (product?.imageData || []).map(data => ({ type:'existing', data })),
  });
  const [saving, setSaving] = React.useState(false);
  const fileRef = React.useRef();

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const addFiles = async (files) => {
    const remaining = 10 - form.images.length;
    const toProcess = Array.from(files).slice(0, remaining);
    const compressed = await Promise.all(toProcess.map(async f => ({
      type: 'new', data: await compressImage(f),
    })));
    set('images', [...form.images, ...compressed]);
  };

  const removeImg = (i) => set('images', form.images.filter((_,idx) => idx !== i));

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!form.name.trim())  { alert('Product name is required.'); return; }
    if (!form.section)      { alert('Section is required.'); return; }
    if (!form.price || isNaN(Number(form.price)) || Number(form.price) <= 0) { alert('Valid price is required.'); return; }
    setSaving(true);
    try {
      const imageData = form.images.map(img => img.data);
      onSave({
        name: form.name.trim(),
        section: form.section,
        short: form.short.trim(),
        long: form.long.trim(),
        instructions: form.instructions.trim(),
        price: Number(form.price),
        badge: form.badge.trim() || null,
        stock_status: form.stock_status,
        is_visible: form.is_visible,
        motif: form.motif,
        palette: form.palette,
        imageData,
        code: product?.code || genCode(totalProducts + 1),
      });
    } catch(err) {
      alert('Error saving product: ' + err.message);
      setSaving(false);
    }
  };

  return (
    <div>
      <div className="adm-page-head">
        <div>
          <h2 className="adm-page-title">{isEdit ? 'Edit Product' : 'Add Product'}</h2>
          {isEdit && <div className="adm-page-sub">#{product.code}</div>}
        </div>
        <button className="adm-btn" onClick={onCancel}>← Back</button>
      </div>
      <form className="adm-form" onSubmit={handleSubmit}>
        <div className="adm-form-grid">
          <div className="adm-field full">
            <label>Product Name *</label>
            <input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="e.g. Chikankari Tunic" />
          </div>
          <div className="adm-field">
            <label>Section *</label>
            <select value={form.section} onChange={e=>set('section',e.target.value)}>
              {sections.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}
            </select>
          </div>
          <div className="adm-field">
            <label>Price (₹) *</label>
            <input type="number" min="1" value={form.price} onChange={e=>set('price',e.target.value)} placeholder="e.g. 1000" />
          </div>
          <div className="adm-field full">
            <label>Short Description <span style={{ textTransform:'none', letterSpacing:0, color:'var(--text-dim)' }}>(shown on card, max 200 chars)</span></label>
            <textarea value={form.short} onChange={e=>set('short',e.target.value)} maxLength={200}
              placeholder="2-3 lines describing the product…" style={{ minHeight:60 }} />
          </div>
          <div className="adm-field full">
            <label>Full Description</label>
            <textarea value={form.long} onChange={e=>set('long',e.target.value)}
              placeholder="Full product story, materials, craftsmanship details…" style={{ minHeight:100 }} />
          </div>
          <div className="adm-field full">
            <label>Care & Special Instructions</label>
            <textarea value={form.instructions} onChange={e=>set('instructions',e.target.value)}
              placeholder="e.g. Cold hand wash. Customisation available." style={{ minHeight:60 }} />
          </div>
          <div className="adm-field">
            <label>Badge <span style={{ textTransform:'none', letterSpacing:0, color:'var(--text-dim)' }}>(optional)</span></label>
            <input value={form.badge} onChange={e=>set('badge',e.target.value)} placeholder="Bestseller / New Arrival / Limited Edition" />
          </div>
          <div className="adm-field">
            <label>Stock Status</label>
            <select value={form.stock_status} onChange={e=>set('stock_status',e.target.value)}>
              <option value="in_stock">In Stock</option>
              <option value="out_of_stock">Out of Stock</option>
              <option value="made_to_order">Made to Order</option>
            </select>
          </div>
          <div className="adm-field">
            <label>Placeholder Motif <span style={{ textTransform:'none', letterSpacing:0, color:'var(--text-dim)' }}>(if no image)</span></label>
            <select value={form.motif} onChange={e=>set('motif',e.target.value)}>
              {MOTIF_OPTS.map(m => <option key={m} value={m}>{m.charAt(0).toUpperCase()+m.slice(1)}</option>)}
            </select>
          </div>
          <div className="adm-field">
            <label>Placeholder Palette</label>
            <select value={JSON.stringify(form.palette)} onChange={e=>set('palette',JSON.parse(e.target.value))}>
              {PALETTE_PRESETS.map(pp => (
                <option key={pp.name} value={JSON.stringify(pp.val)}>{pp.name}</option>
              ))}
            </select>
          </div>
          <div className="adm-field full">
            <label>Visibility</label>
            <AdmToggle value={form.is_visible} onChange={v=>set('is_visible',v)}
              label={form.is_visible ? 'Visible on storefront' : 'Hidden from storefront'} />
          </div>
        </div>

        <hr className="adm-divider" />

        <div className="adm-field">
          <label>Product Images <span style={{ textTransform:'none', letterSpacing:0, color:'var(--text-dim)' }}>(max 10 · first = cover · stored in Firebase Storage)</span></label>
          <div className="adm-upload-zone"
            onClick={() => fileRef.current && fileRef.current.click()}
            onDrop={e => { e.preventDefault(); if(e.dataTransfer.files.length) addFiles(e.dataTransfer.files); }}
            onDragOver={e => e.preventDefault()}>
            <p>Drag & drop images here, or click to browse</p>
            <small>JPG, PNG, WebP · Up to {10 - form.images.length} more</small>
          </div>
          <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp"
            multiple style={{ display:'none' }}
            onChange={e => { if(e.target.files.length) addFiles(e.target.files); e.target.value=''; }} />
          {form.images.length > 0 && (
            <div className="adm-img-previews">
              {form.images.map((img, i) => (
                <div key={i} className="adm-img-preview">
                  <img src={img.data} alt="" />
                  {i === 0 && <div className="adm-img-cover">Cover</div>}
                  <button type="button" onClick={() => removeImg(i)}>×</button>
                </div>
              ))}
            </div>
          )}
        </div>

        <hr className="adm-divider" />

        <div style={{ display:'flex', gap:12 }}>
          <button type="submit" className="adm-btn adm-btn-primary" disabled={saving}>
            {saving ? 'Saving…' : (isEdit ? 'Save Changes' : 'Add Product')}
          </button>
          <button type="button" className="adm-btn" onClick={onCancel} disabled={saving}>Cancel</button>
        </div>
      </form>
    </div>
  );
};
